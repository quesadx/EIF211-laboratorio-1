services:
    mongodb:
      image: mongo:7
      container_name: mongo-db
      ports:
        - "27017:27017"
      environment:
        MONGO_INITDB_ROOT_USERNAME: admin
        MONGO_INITDB_ROOT_PASSWORD: admin
      volumes:
        - mongo_data:/data/db
      restart: unless-stopped
volumes:
  mongo_data:
